<!DOCTYPE html>
<html>
<body>
  <li data-hook="review" id="RSTANDARDEN01">
    <span class="a-profile-name">John Doe</span>
    <i data-hook="review-star-rating" class="a-icon a-icon-star a-star-4 review-rating">
      <span class="a-icon-alt">4.0 out of 5 stars</span>
    </i>
    <a data-hook="review-title">
      <span>Great product</span>
    </a>
    <div data-hook="review-body">
      <span>This product works well.</span>
    </div>
    <span data-hook="review-date">Reviewed in the United States on October 25, 2023</span>
    <span data-hook="avp-badge">Verified Purchase</span>
    <span data-hook="helpful-vote-statement">5 people found this helpful</span>
  </li>
</body>
</html>
