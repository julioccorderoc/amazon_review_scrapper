<!DOCTYPE html>
<html>
<body>
  <!-- No span.a-icon-alt — rating must come from the a-star-4 CSS class -->
  <li data-hook="review" id="RCSSRATING01">
    <span class="a-profile-name">Alice Smith</span>
    <i data-hook="review-star-rating" class="a-icon a-icon-star a-star-4 review-rating"></i>
    <a data-hook="review-title">
      <span>Solid build</span>
    </a>
    <div data-hook="review-body">
      <span>Sturdy and well made.</span>
    </div>
    <span data-hook="review-date">Reviewed in the United States on January 10, 2024</span>
  </li>
</body>
</html>
