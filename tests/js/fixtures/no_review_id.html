<!DOCTYPE html>
<html>
<body>
  <!-- li has no id attribute — must be skipped -->
  <li data-hook="review">
    <span class="a-profile-name">Ghost User</span>
    <i data-hook="review-star-rating">
      <span class="a-icon-alt">2.0 out of 5 stars</span>
    </i>
    <a data-hook="review-title">
      <span>Not great</span>
    </a>
    <div data-hook="review-body">
      <span>Disappointed.</span>
    </div>
    <span data-hook="review-date">Reviewed in the United States on July 4, 2023</span>
  </li>
</body>
</html>
