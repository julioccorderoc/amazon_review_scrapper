<!DOCTYPE html>
<html>
<body>

  <li data-hook="review" id="RNOHELPFUL01">
    <span class="a-profile-name">Bob Lee</span>
    <i data-hook="review-star-rating">
      <span class="a-icon-alt">3.0 out of 5 stars</span>
    </i>
    <a data-hook="review-title">

    </a>
    <div data-hook="review-body">
      <span>Does the job.</span>
    </div>
    <span data-hook="review-date">Reviewed in the United States on June 1, 2023</span>
  </li>
</body>
</html>
